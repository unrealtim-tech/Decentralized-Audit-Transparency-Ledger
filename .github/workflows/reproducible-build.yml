name: Reproducible WASM Build

permissions:
  contents: read
  actions: read

on:
  push:
    branches:
      - main
      - master
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-wasm-sha256:
    name: Build WASM and compute SHA-256
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Rust toolchain 1.80.0
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.80.0
          components: clippy, rustfmt

      - name: Add WASM target
        run: rustup target add wasm32-unknown-unknown

      - name: Build WASM (reproducible)
        run: |
          cargo clean
          cargo build --target wasm32-unknown-unknown --release --locked

      - name: Compute SHA-256
        id: hash
        run: |
          WASM_FILE="target/wasm32-unknown-unknown/release/audit_ledger.wasm"
          SHA256=$(sha256sum "$WASM_FILE" | cut -d' ' -f1)
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "WASM SHA-256: $SHA256"
          echo "$SHA256" > wasm-sha256.txt
          cat wasm-sha256.txt

      - name: Upload SHA-256 artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-sha256
          path: wasm-sha256.txt
          retention-days: 30

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: audit_ledger.wasm
          path: target/wasm32-unknown-unknown/release/audit_ledger.wasm
          retention-days: 30

      - name: Post SHA-256 as job summary
        run: |
          echo "## WASM Binary Verification" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Git Commit**: $(git rev-parse HEAD)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Rust Version**: 1.80.0" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          cat wasm-sha256.txt >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Instructions for verification**:" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Clone the repository at commit $(git rev-parse --short HEAD)" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Install Rust 1.80.0: \`rustup install 1.80.0\`" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Build locally: \`cargo build --target wasm32-unknown-unknown --release --locked\`" >> "$GITHUB_STEP_SUMMARY"
          echo "4. Verify: \`sha256sum target/wasm32-unknown-unknown/release/audit_ledger.wasm\`" >> "$GITHUB_STEP_SUMMARY"
          echo "5. Compare with hash above" >> "$GITHUB_STEP_SUMMARY"
