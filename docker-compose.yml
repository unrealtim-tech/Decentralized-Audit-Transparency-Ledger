version: "3.9"

services:
  relayer:
    build: ./bridge/relayer
    image: audit-ledger-relayer:latest
    environment:
      STELLAR_RPC: "${STELLAR_RPC:-https://soroban-testnet.stellar.org}"
      CONTRACT_ID: "${CONTRACT_ID}"
      EVM_RPC: "${EVM_RPC:-http://localhost:8545}"
      VERIFIER_ADDRESS: "${VERIFIER_ADDRESS}"
      RELAY_PRIVATE_KEY: "${RELAY_PRIVATE_KEY}"
      POLL_INTERVAL_MS: "${POLL_INTERVAL_MS:-5000}"
      HEALTH_PORT: "8080"
    ports:
      - "8080:8080"
    restart: unless-stopped
    # Issue #145: Health check endpoint
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3

  metrics-exporter:
    build: ./tools/metrics-exporter
    image: audit-ledger-metrics-exporter:latest
    environment:
      CONTRACT_ID: "${CONTRACT_ID}"
      RPC_URL: "${RPC_URL:-https://soroban-testnet.stellar.org}"
      NETWORK: "${NETWORK:-testnet}"
      SCRAPE_INTERVAL_MS: "${SCRAPE_INTERVAL_MS:-15000}"
      EVENT_TYPES: "${EVENT_TYPES:-}"
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    ports:
      - "9090:9090"
    restart: unless-stopped
    depends_on:
      - metrics-exporter

  grafana:
    image: grafana/grafana:10.4.0
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/audit-ledger.json
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      - prometheus

  ui:
    build: ./ui
    image: audit-ledger-ui:latest
    environment:
      NEXT_PUBLIC_CONTRACT_ID: "${CONTRACT_ID}"
      NEXT_PUBLIC_RPC_URL: "${RPC_URL:-https://soroban-testnet.stellar.org}"
      NEXT_PUBLIC_NETWORK: "${NETWORK:-testnet}"
      NEXT_PUBLIC_EVENT_TYPES: "${EVENT_TYPES:-payment,refund,transfer}"
    ports:
      - "3001:3001"
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
